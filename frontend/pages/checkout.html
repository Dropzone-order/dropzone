<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Dropzone Collection</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-brand"><a href="/"><img src="/images/logo.png" class="nav-logo"/></a></div>
  <ul class="nav-links">
    <li><a href="/">HOME</a></li><li><a href="/pages/shop.html">SHOP</a></li>
    <li><a href="/pages/orders.html" id="ordersLink" style="display:none">ORDERS</a></li>
  </ul>
  <div class="nav-actions">
    <a href="/pages/cart.html" class="cart-icon">🛒 <span class="cart-count" id="cartCount">0</span></a>
    <div id="authButtons"><a href="/pages/login.html" class="btn-outline">LOGIN</a></div>
    <div id="userMenu" style="display:none">
      <span class="user-name" id="userName"></span>
      <button onclick="logout()" class="btn-outline">LOGOUT</button>
    </div>
  </div>
  <button class="hamburger" id="hamburger">☰</button>
</nav>

<section class="checkout-page">
  <h1 class="page-title">CHECKOUT</h1>
  <div id="checkoutContent"></div>
</section>

<script src="/js/app.js"></script>
<script>
  // Redirect to login if not logged in
  if (!getToken()) {
    window.location.href = '/pages/login.html';
  }

  const cart = getCart();
  if (!cart.length) window.location.href = '/pages/cart.html';

  const subtotal = cart.reduce((a, b) => a + b.price * b.quantity, 0);
  const shipping = 60;
  const total = subtotal + shipping;

  document.getElementById('checkoutContent').innerHTML = `
    <div class="checkout-grid">
      <div>
        <h2 class="checkout-section-title">SHIPPING ADDRESS</h2>
        <div id="errMsg" class="error-msg" style="display:none"></div>
        <div class="form-group"><label>FULL NAME</label><input type="text" id="shName" placeholder="Name"/></div>
        <div class="form-group"><label>PHONE</label><input type="tel" id="shPhone" placeholder="10-digit mobile"/></div>
        <div class="form-group"><label>ADDRESS</label><input type="text" id="shStreet" placeholder="Street, Area"/></div>
        <div class="form-group"><label>CITY</label><input type="text" id="shCity" placeholder="City"/></div>
        <div class="form-group"><label>STATE</label><input type="text" id="shState" placeholder="State"/></div>
        <div class="form-group"><label>PINCODE</label><input type="text" id="shPincode" placeholder="6-digit pincode" maxlength="6"/></div>
      </div>
      <div class="cart-summary">
        <h3>ORDER SUMMARY</h3>
        ${cart.map(item => `
          <div class="summary-row">
            <span>${item.name} (${item.size}) ×${item.quantity}</span>
            <span>₹${item.price * item.quantity}</span>
          </div>
        `).join('')}
        <div class="summary-row"><span>Shipping (Delhivery)</span><span>₹${shipping}</span></div>
        <div class="summary-row total"><span>TOTAL</span><span>₹${total}</span></div>
        <button class="btn-primary" onclick="placeOrder()" style="width:100%;margin-top:24px;text-align:center">
          PAY ₹${total}
        </button>
        <p style="font-family:var(--font-mono);font-size:11px;color:var(--grey);text-align:center;margin-top:12px">
          Secure payment via Razorpay
        </p>
      </div>
    </div>`;

  async function placeOrder() {
    const addr = {
      name: document.getElementById('shName').value.trim(),
      phone: document.getElementById('shPhone').value.trim(),
      street: document.getElementById('shStreet').value.trim(),
      city: document.getElementById('shCity').value.trim(),
      state: document.getElementById('shState').value.trim(),
      pincode: document.getElementById('shPincode').value.trim(),
    };

    const err = document.getElementById('errMsg');
    if (!addr.name || !addr.phone || !addr.street || !addr.city || !addr.state || !addr.pincode) {
      err.style.display = 'block';
      err.textContent = 'Please fill all shipping details';
      return;
    }

    try {
      // Create order in DB
      const orderRes = await fetch('/api/orders', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          items: cart.map(i => ({
            product: i._id,
            name: i.name,
            price: i.price,
            quantity: i.quantity,
            size: i.size,
            image: i.images?.[0] || ''
          })),
          shippingAddress: addr,
          totalAmount: total
        })
      });
      const order = await orderRes.json();
      if (!order._id) throw new Error(order.message || 'Order failed');

      // Create Razorpay order
      const payRes = await fetch('/api/payment/create-order', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ amount: total })
      });
      const payData = await payRes.json();

      // Open Razorpay
      const user = getUser();
      const rzp = new Razorpay({
        key: 'rzp_live_SPUEFL39ALT5W8', // Replace with your key
        amount: payData.amount,
        currency: payData.currency,
        order_id: payData.orderId,
        name: 'Dropzone Collection',
        description: 'T-Shirt Order',
        image: '/images/logo.png',
        prefill: { name: user?.name, email: user?.email, contact: addr.phone },
        theme: { color: '#a02040' },
        handler: async function (response) {
          // Verify payment
          const verRes = await fetch('/api/payment/verify', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              orderId: order._id
            })
          });
          const verData = await verRes.json();
          if (verData.success) {
            localStorage.removeItem('dz_cart');
            window.location.href = `/pages/orders.html?success=1`;
          } else {
            showToast('Payment verification failed');
          }
        },
        modal: { ondismiss: () => showToast('Payment cancelled') }
      });
      rzp.open();
    } catch(e) {
      err.style.display = 'block';
      err.textContent = e.message || 'Something went wrong';
    }
  }
</script>
</body>
</html>
