<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — Dropzone Collection</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-brand"><a href="/"><img src="/images/logo.png" class="nav-logo"/></a></div>
  <ul class="nav-links">
    <li><a href="/">HOME</a></li>
    <li><a href="/pages/shop.html">SHOP</a></li>
    <li><a href="/pages/orders.html" id="ordersLink" style="display:none">ORDERS</a></li>
    <li><a href="/pages/admin.html" id="adminLink" style="display:none">ADMIN</a></li>
  </ul>
  <div class="nav-actions">
    <a href="/pages/cart.html" class="cart-icon">🛒 <span class="cart-count" id="cartCount">0</span></a>
    <div id="authButtons"><a href="/pages/login.html" class="btn-outline">LOGIN</a></div>
    <div id="userMenu" style="display:none">
      <span class="user-name" id="userName"></span>
      <button onclick="logout()" class="btn-outline">LOGOUT</button>
    </div>
  </div>
  <button class="hamburger" id="hamburger">☰</button>
</nav>

<section class="cart-page">
  <h1 class="page-title">YOUR CART</h1>
  <div id="cartContent"></div>
</section>

<script src="/js/app.js"></script>
<script>
  function renderCart() {
    const cart = getCart();
    const content = document.getElementById('cartContent');

    if (!cart.length) {
      content.innerHTML = `
        <div style="text-align:center;padding:80px 0">
          <p style="font-family:var(--font-mono);color:var(--grey);font-size:14px;letter-spacing:3px;margin-bottom:30px">YOUR CART IS EMPTY</p>
          <a href="/pages/shop.html" class="btn-primary">SHOP NOW</a>
        </div>`;
      return;
    }

    const subtotal = cart.reduce((a, b) => a + b.price * b.quantity, 0);
    const shipping = 60;
    const total = subtotal + shipping;

    content.innerHTML = `
      <div class="cart-grid">
        <div>
          ${cart.map((item, i) => `
            <div class="cart-item">
              <img src="${item.images?.[0] || '/images/tshirt1.jpeg'}" class="cart-item-img" alt="${item.name}"/>
              <div>
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-size">Size: ${item.size}</div>
                <div class="cart-item-price">₹${item.price} × ${item.quantity} = ₹${item.price * item.quantity}</div>
              </div>
              <button class="cart-item-remove" onclick="removeItem(${i})">✕</button>
            </div>
          `).join('')}
        </div>
        <div class="cart-summary">
          <h3>ORDER SUMMARY</h3>
          <div class="summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
          <div class="summary-row"><span>Shipping</span><span>₹${shipping}</span></div>
          <div class="summary-row total"><span>TOTAL</span><span>₹${total}</span></div>
          <a href="/pages/checkout.html" class="btn-primary" style="display:block;text-align:center;margin-top:24px">
            CHECKOUT
          </a>
          <a href="/pages/shop.html" style="display:block;text-align:center;margin-top:16px;font-family:var(--font-mono);font-size:12px;color:var(--grey)">
            Continue Shopping
          </a>
        </div>
      </div>`;
  }

  function removeItem(index) {
    removeFromCart(index);
    renderCart();
  }

  renderCart();
</script>
</body>
</html>
